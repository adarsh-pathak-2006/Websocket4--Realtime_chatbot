{% extends "base.html" %}

{% block title %}Chat - AI Assistant{% endblock title %}

{% block body %}
<style>
    .chat-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
    }
    .chat-header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--glass-border);
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
    }
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 12px;
        line-height: 1.5;
        font-size: 0.95rem;
    }
    .message.user {
        align-self: flex-end;
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 4px;
    }
    .message.ai {
        align-self: flex-start;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        border-bottom-left-radius: 4px;
    }
    .chat-input-area {
        padding: 20px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--glass-border);
    }
    .input-form {
        display: flex;
        gap: 10px;
    }
    .input-form input {
        margin: 0;
        flex: 1;
        border-radius: 24px;
        padding: 14px 20px;
    }
    .input-form button {
        width: auto;
        border-radius: 24px;
        padding: 0 24px;
    }
    /* Typing indicator */
    .typing {
        display: none;
        align-self: flex-start;
        background: var(--glass-bg);
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        font-size: 0.875rem;
        color: var(--text-muted);
    }
</style>

<div class="chat-container">
    <div class="chat-header">
        <h2 style="font-size: 1.25rem; font-weight: 600;">AI Assistant</h2>
        <a href="{% url 'login' %}" style="font-size: 0.875rem; color: var(--text-muted);">Leave Chat</a>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="message ai">
            Hello! I'm your AI assistant. How can I help you today?
        </div>
        <div class="typing" id="typing-indicator">AI is typing...</div>
    </div>

    <div class="chat-input-area">
        <form class="input-form" id="chat-form">
            <input type="text" id="chat-input" placeholder="Type your message here..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const typingIndicator = document.getElementById('typing-indicator');

    // Use wss:// if protocol is https
    const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
    const wsEndpoint = `${wsProtocol}://${window.location.host}/ws/cb/`;
    
    let chatSocket;
    let currentAiMessageDiv = null;

    function connect() {
        chatSocket = new WebSocket(wsEndpoint);

        chatSocket.onopen = function(e) {
            console.log("WebSocket connected.");
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            if (data.type === 'ai_response') {
                typingIndicator.style.display = 'none';
                
                // If there's no active bubble, create one
                if (!currentAiMessageDiv) {
                    currentAiMessageDiv = document.createElement('div');
                    currentAiMessageDiv.classList.add('message', 'ai');
                    chatMessages.insertBefore(currentAiMessageDiv, typingIndicator);
                }
                
                // Append the incoming chunk to the same bubble
                currentAiMessageDiv.textContent += data.message;
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
            } else if (data.type === 'done') {
                // Response is complete, reset the active bubble
                currentAiMessageDiv = null;
            }
        };

        chatSocket.onclose = function(e) {
            console.error('Chat socket closed unexpectedly');
            // Try to reconnect in 3 seconds
            setTimeout(connect, 3000);
        };
    }
    
    connect();

    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;

        // Display user message
        appendMessage('user', message);
        chatInput.value = '';

        // Show typing indicator
        typingIndicator.style.display = 'block';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Send to server
        chatSocket.send(JSON.stringify({
            'message': message
        }));
    });

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        // Basic escaping to prevent XSS (can be enhanced)
        msgDiv.textContent = text;
        
        // Insert before typing indicator
        chatMessages.insertBefore(msgDiv, typingIndicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>
{% endblock body %}
